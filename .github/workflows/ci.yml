name: Data Analysis CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy scipy statsmodels pingouin matplotlib seaborn jupyter

      - name: Validate Python analysis files
        run: |
          find . -name "*.py" -exec python -m py_compile {} \; && echo "All Python files OK"

      - name: Check notebooks exist
        run: |
          find . -name "*.ipynb" | head -5
          echo "Notebooks found OK"

      - name: Pipeline status
        run: echo "Data Analysis pipeline validation complete"